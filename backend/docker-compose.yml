services:
  mysql:
    image: mysql:8.0
    container_name: curtain_mysql
    restart: always
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: curtain_call
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-curtain1234!}
      TZ: Asia/Seoul
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: curtain_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    image: ${BACKEND_IMAGE:-curtain_backend:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: curtain_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/curtain_call?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - DB_PASSWORD=${DB_PASSWORD:-curtain1234!}
      - TZ=Asia/Seoul
    depends_on:
      - mysql
      - redis

volumes:
  mysql_data:
  redis_data:
