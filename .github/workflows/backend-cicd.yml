name: Backend ECR CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'backend/**'
      - '.github/workflows/**'

env:
  AWS_REGION: ap-northeast-2                   # AWS 서울 리전
  ECR_REPOSITORY: curtain-call-backend         # 생성할 ECR 리포지토리 이름

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 저장소 코드 체크아웃
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Java 21 및 Gradle 세팅
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. 백엔드 단위 테스트 실행
      - name: Run Tests
        working-directory: ./backend
        run: |
          chmod +x ./gradlew
          ./gradlew test

      # 4. AWS 자격 증명 설정 (IAM User Access Key)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 5. AWS ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 6. Docker 이미지 빌드, 태깅 및 ECR에 Push
      - name: Build and Push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest
        run: |
          cd backend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 7. EC2 원격 접속 후 배포 (CD)
      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY, AWS_REGION, ECR_REPOSITORY
          script: |
            # EC2 내부에서 ECR 로그인 (EC2 인스턴스에 IAM Role 연결 권장)
            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
            
            cd ~/backend
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" > .env
            
            # docker-compose.yml 내부의 이미지명을 ECR 주소로 덮어쓰거나 환경변수 적용
            export BACKEND_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:latest"
            
            docker compose pull backend
            docker compose up -d backend
